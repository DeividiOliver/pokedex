<div class="pokemon-card" [ngClass]="'bg-' + mainType" *ngIf="pokemon">
  
  <span class="pokemon-card__id">#{{ pokemon.id | number:'3.0-0' }}</span>

  <div class="pokemon-card__image-container">
    <img [src]="pokemonImage" [alt]="pokemon.name" class="pokemon-card__img">
  </div>

  <div class="pokemon-card__content">
    <h3 class="pokemon-card__name">{{ pokemon.name }}</h3>
    
    <div class="pokemon-card__types">
      @for (t of pokemon.types; track t.type.name) {
        <span class="type-badge" [ngClass]="'bg-' + t.type.name">
          {{ t.type.name }}
        </span>
      }
    </div>
  </div>
</div>
