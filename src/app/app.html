<main class="main-container">
  <h1>Pokédex</h1>

  <div class="search-container">
    <input 
      type="text" 
      placeholder="Pesquisar Pokémon pelo nome..." 
      (input)="onSearchChange($event)"
    >
  </div>

  <!-- TO DO implementar botoes de paginacao -->
   <!-- faça com que os botoes atualizem o numero da pagina -->
  <div>
    <button>página anterior</button>
    <p>{{pagina}}</p>
    <button>próxima pagina</button>
  </div>


  <div class="pokemon-grid">
    @for (pokemon of filteredPokemonList; track pokemon.id) {
      <app-card [pokemon]="pokemon"></app-card>
    }
  </div>
</main>
