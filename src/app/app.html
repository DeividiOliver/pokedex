<main class="main-container">
  <!-- Topo da página (Opcional: Você pode colocar um logo aqui depois) -->
  <header>
    <h1 style="color: #666; margin-bottom: 20px;">Pokédex</h1>
  </header>

  <!-- Container de Grade que configuramos no Passo 2 -->
  <div class="pokemon-grid">
    @for (item of pokemonList; track item.id) {
      <app-card [pokemon]="item"></app-card>
    }
  </div>
</main>
