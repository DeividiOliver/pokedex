<main class="bg-dark d-flex justify-content-center">
  <div class="bg-white w-75 h-100">
    <div class="bg-secondary py-5 px-3 d-flex flex-column">
      
      <!-- O loop deve usar a variável 'pokemonList' que está no seu app.ts -->
      @for (item of pokemonList; track item.id) {
        <app-card [pokemon]="item"></app-card>
      }

    </div>
  </div>
</main>
